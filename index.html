<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>みんなのTODOリスト</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #0071e3;
    }

    .add-btn {
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-btn:hover {
      background: #0062c4;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f5f5f7;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #1d1d1f;
      font-size: 16px;
    }

    .delete-btn {
      background: #ff3b30;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #d92c23;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>TODO</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="やることを入力">
      <button class="add-btn" onclick="addTask()">追加</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function renderTasks() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      tasks.forEach((task, index) => {
        const li = document.createElement("li");

        const text = document.createElement("span");
        text.textContent = task;

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "削除";
        deleteBtn.className = "delete-btn";

        deleteBtn.onclick = function () {
          tasks.splice(index, 1);
          saveTasks();
          renderTasks();
        };

        li.appendChild(text);
        li.appendChild(deleteBtn);

        taskList.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById("taskInput");

      if (input.value === "") return;

      tasks.push(input.value);

      saveTasks();
      renderTasks();

      input.value = "";
    }

    renderTasks();
  </script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnxLnNJ3XFF4aMOC38ASvHfrE41PyNvlY",
  authDomain: "todo-app-3faaa.firebaseapp.com",
  projectId: "todo-app-3faaa",
  storageBucket: "todo-app-3faaa.firebasestorage.app",
  messagingSenderId: "155044279492",
  appId: "1:155044279492:web:bb08877953d5f136720591",
  measurementId: "G-KTGWEFK8GM"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.createElement("button");
loginBtn.innerText = "Googleでログイン";
loginBtn.style.marginBottom = "20px";
const logoutBtn = document.createElement("button");
logoutBtn.innerText = "ログアウト";
logoutBtn.style.marginLeft = "10px";

const userText = document.createElement("p");

document.body.prepend(userText);
document.body.prepend(logoutBtn);
document.body.prepend(loginBtn);

logoutBtn.style.display = "none";


loginBtn.addEventListener("click", async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (error) {
    alert("ログイン失敗");
    console.error(error);
  }
});
logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
});
onAuthStateChanged(auth, (user) => {
if (user) {
  userText.innerText = `こんにちは、${user.displayName}`;
  loginBtn.style.display = "none";
  logoutBtn.style.display = "inline-block";
} else {
  userText.innerText = "";
  loginBtn.style.display = "inline-block";
  logoutBtn.style.display = "none";
}
});
</script>
</body>
</html>
